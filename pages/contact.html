<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle - Contact</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="/Assets/logos/favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <header>
        <a href="../index.html"><img src="/Assets/logos/circle.svg" alt=""></a>
        <svg id="menu-burger" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-menu-2"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6l16 0" /><path d="M4 12l16 0" /><path d="M4 18l16 0" /></svg>
        
        <nav>
            <h1 id="cerrar">X</h1>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#projects-container">Projects</a></li>
                <li><a href="../index.html#services-sectionLink">Services</a></li>
            </ul>
            <button><a href="../pages/contact.html">Contact Us</a></button>
        </nav>
        
    </header>
    
<main id="contact">
    <form action="" id="form">
        <label for="name">
            Full Name
            <input name="name" id="name" placeholder="Enter your full name">
            <span class="error-message" id="name-error">Es un Campo Obligatorio</span>
        </label>
        <div>
        <label for="email">
            Email
            <input type="email" name="email" id="email" placeholder="Enter your email address">
            <span class="error-message" id="email-error">Es un Campo Obligatorio</span>
        </label>
        <label for="phone">
            Phone
            <input type="tel" name="phone" id="phone" placeholder="Enter your phone number">
            <span class="error-message" id="phone-error">Es un Campo Obligatorio</span>
        </label>
    </div>
        <label for="message">
            Message
            <textarea name="message" id="message" cols="30" rows="10" placeholder="Write your message here..."></textarea>
            <span class="error-message" id="message-error">Es un Campo Obligatorio</span>
        </label>
        <button type="submit">Send</button>
    </form>
</main>


    <footer>
        <div class="footer-info">
            <a href="index.html"><img class="logo" src="/Assets/logos/circle.svg" alt=""></a>
            <p>2972 Westheimer Rd. Santa Ana, 
                <br>Illinois 85486 </p>
        </div>
        <div class="footer-links">
        <ul>
            <li>Team</li>
            <li>Services</li>
            <li>About</li>
        </ul>
        <ul>
            <li>Press</li>
            <li>Projects</li>
            <li>Privacy Policy</li>
        </ul>
        </div>
    </footer>
    <div id="modal" style="display:none">
    <div class="modal-content">
        <div id="close-modal">✕</div>

        <!-- Fase 1 -->
        <div class="loader" id="modal-spinner"></div>

        <!-- Fase 2 y 3 (ocultas hasta que toca) -->
        <div id="modal-success" style="display:none">
            <svg class="checkmark" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark-check" fill="none" d="M14 27 l7 7 l16 -16"/>
            </svg>
            <p id="msg-principal"></p>
            <p id="msg-secundario" style="display:none">Contestaremos en la mayor brevedad 💙</p>
            <p class="footer-donate" id="msg-donate" style="display:none">
                ¿Contento con el servicio? <br> Puedes invitarnos a un café ☕ 
                <span>Bizum: <strong>612 345 678</strong></span>
            </p>
    </div>
</div>
    </body>
<script src="../js/validate.js" defer></script>
<script src="../js/burger.js" defer></script>
</html>
