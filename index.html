<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h4 class="logo">Clicle</h4>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Services</a></li>
            </ul>
        </nav>
        <button>Contacta</button>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>Empower Your Business with Stunning Design</h2>
                <p>Circle is a digital design and development studio. We design and develop astonishing websites and mobile apps.</p>
                <div class="hero-buttons">
                    <button>Get in touch</button>
                    <span>See our work</span>
                </div>
            </div>
            <div class="hero-image">
                <img src="Assets/hero-section/hero-image.png" alt="Hero Image">
            </div>
        </section>
        <section>
            <div class="logos-section">
                <div class="logo-item">
                    <img src="Assets/logos/airbnb-logo.svg" alt="Logo 1">
                </div>
                <div class="logo-item">
                    <img src="Assets/logos//google-logo.svg" alt="Logo 2">
                </div>
                <div class="logo-item">
                    <img src="Assets/logos/microsoft-logo.svg" alt="Logo 3">
                </div>
                <div class="logo-item">
                    <img src="Assets/logos/fedex-logo.svg" alt="Logo 4">
                </div>
                <div class="logo-item">
                    <img src="Assets/logos/amazon-logo.svg" alt="Logo 4">
                </div>
            </div>
        </section>
    </main>
    
</body>
<script src="main.js"></script>
</html>
